{% extends 'base.html' %}

{% block contenido %}


<div class="row justify-content-center">

<div class="col-md-5">


<div class="card shadow">


<div class="card-body">


<h2 class="text-center mb-4">
📝 Crear cuenta
</h2>



<form method="POST">


<div class="mb-3">

<label class="form-label">
Nombre
</label>

<input
type="text"
name="nombre"
class="form-control"
required>

</div>



<div class="mb-3">

<label class="form-label">
Email
</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>



<div class="mb-3">

<label class="form-label">
Contraseña
</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>



<button class="btn btn-success w-100">

Registrarme

</button>


</form>


</div>

</div>


</div>

</div>


{% endblock %}
