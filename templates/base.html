<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mini Tentaciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url('/static/img/mi_fondo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .contenido-principal {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.3rem;
        }

        .btn-nav {
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand" href="/">
                🍩 Mini Tentaciones
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContenido">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarContenido">

                <div class="d-flex flex-wrap gap-2 mt-3 mt-lg-0">

                    <!-- Carrito -->
                    <a class="btn btn-outline-light btn-nav" href="/carrito">
                        🛒 Carrito
                    </a>

                    {% if current_user.is_authenticated %}
                    <a class="btn btn-outline-primary" href="/mis-pedidos">
    📋 Mis pedidos
</a>

                        {% if current_user.es_admin %}

                            <!-- Panel Admin -->
                            <a class="btn btn-warning btn-nav" href="/admin">
                                ⚙️ Admin
                            </a>

                            <!-- Pedidos -->
                            <a class="btn btn-info btn-nav" href="/admin/pedidos">
                                📦 Pedidos
                            </a>

                        {% endif %}

                        <!-- Cerrar sesión -->
                        <a class="btn btn-danger btn-nav" href="/logout">
                            🚪 Salir
                        </a>

                    {% else %}

                        <!-- Login -->
                        <a class="btn btn-outline-info btn-nav" href="/login">
                            🔐 Login
                        </a>

                        <!-- Registro -->
                        <a class="btn btn-success btn-nav" href="/registro">
                            📝 Registrarse
                        </a>

                    {% endif %}

                </div>

            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <div class="container py-4">

        <div class="contenido-principal">

            {% block contenido %}{% endblock %}

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
